<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgriRental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fdf9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            background: white;
        }
        .btn-green {
            background-color: #2d6a4f;
            color: white;
            border-radius: 12px;
            padding: 10px 25px;
            font-weight: 600;
            width: 100%;
        }
        .btn-green:hover {
            background-color: #1b4332;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="text-center fw-bold mb-4" style="color: #2d6a4f;">Welcome Back</h2>
        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-green mt-3">Login</button>
        </form>
        <div class="text-center mt-3">
            <p>Don't have an account? <a href="/signup" style="color: #2d6a4f; font-weight: 600;">Sign Up</a></p>
        </div>
    </div>
</body>
</html>
