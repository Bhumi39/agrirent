<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - AgriRental</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --secondary-green: #40916c;
            --light-green: #d8f3dc;
            --dark-green: #1b4332;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fdf9;
        }

        .navbar {
            background: linear-gradient(135deg, var(--dark-green), var(--primary-green));
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .table-custom {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .table-custom thead {
            background-color: var(--primary-green);
            color: white;
        }

        .btn-cancel {
            background-color: #e63946;
            color: white;
            border-radius: 8px;
            padding: 5px 15px;
            font-size: 0.9rem;
            border: none;
        }

        .btn-cancel:hover {
            background-color: #c1121f;
            color: white;
        }

        .btn-view {
            background-color: var(--secondary-green);
            color: white;
            border-radius: 8px;
            padding: 5px 15px;
            font-size: 0.9rem;
            border: none;
            text-decoration: none;
        }

        .btn-view:hover {
            background-color: var(--dark-green);
            color: white;
        }

        .footer {
            background-color: var(--dark-green);
            color: white;
            padding: 3rem 0;
            margin-top: auto;
        }

        .page-wrap {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
    </style>
</head>
<body class="page-wrap">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">🚜 AGRIRENTAL</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/bookings">My Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container mt-5 flex-grow-1">
        <h2 class="fw-bold mb-4" style="color: var(--primary-green);">My Bookings</h2>

        <div class="table-responsive table-custom">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Equipment</th>
                        <th>From Date</th>
                        <th>To Date</th>
                        <th>Total Cost</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${bookings.isEmpty()}">
                        <td colspan="6" class="text-center py-4 text-muted">No bookings found.</td>
                    </tr>
                    <tr th:each="booking : ${bookings}">
                        <td th:text="'#' + ${booking.id}">#1234</td>
                        <td>
                            <div class="d-flex align-items-center">
                                <img th:src="${booking.equipment.imageUrl}" alt="" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px; margin-right: 15px;">
                                <span class="fw-bold" th:text="${booking.equipment.name}">Tractor</span>
                            </div>
                        </td>
                        <td th:text="${booking.fromDate}">2023-10-01</td>
                        <td th:text="${booking.toDate}">2023-10-05</td>
                        <td class="fw-bold text-success" th:text="'₹' + ${booking.totalCost}">₹5000</td>
                        <td>
                            <div class="d-flex gap-2">
                                <a th:href="@{/receipt(bookingId=${booking.id})}" class="btn-view">Receipt</a>
                                <form th:action="@{/cancel-booking}" method="post" onsubmit="return confirm('Are you sure you want to cancel this booking?');">
                                    <input type="hidden" name="bookingId" th:value="${booking.id}">
                                    <button type="submit" class="btn-cancel">Cancel</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer mt-5">
        <div class="container text-center">
            <p class="mb-2 fw-bold">© 2026 AgriRental Systems Pvt. Ltd.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
