<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - AgriRental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fdf9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .error-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            background: white;
            text-align: center;
        }
        .error-code {
            font-size: 5rem;
            font-weight: 800;
            color: #e63946;
            margin-bottom: 0;
            line-height: 1;
        }
        .btn-green {
            background-color: #2d6a4f;
            color: white;
            border-radius: 12px;
            padding: 10px 25px;
            font-weight: 600;
        }
        .btn-green:hover {
            background-color: #1b4332;
            color: white;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <h1 class="error-code">Oops!</h1>
        <h3 class="mt-3 mb-2 fw-bold text-dark">Something went wrong</h3>
        <p class="text-muted mb-4">We're sorry, but we can't find the page you're looking for or an unexpected error occurred.</p>
        <a href="/" class="btn btn-green">Go Back Home</a>
    </div>
</body>
</html>
