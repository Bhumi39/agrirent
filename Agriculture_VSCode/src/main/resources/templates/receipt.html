<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Receipt - AgriRental</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --primary-green: #2d6a4f;
            --secondary-green: #40916c;
            --light-green: #d8f3dc;
            --dark-green: #1b4332;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f4f9f4;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 0;
        }

        .receipt-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 600px;
            border: 1px solid #e2e8f0;
            position: relative;
        }

        /* Top decorative border */
        .receipt-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, var(--dark-green), var(--primary-green), var(--secondary-green));
        }

        .receipt-header {
            text-align: center;
            padding: 2rem 2rem 1rem;
            border-bottom: 2px dashed #e2e8f0;
        }

        .receipt-logo {
            font-size: 2.5rem;
            color: var(--primary-green);
            margin-bottom: 0.5rem;
        }

        .receipt-title {
            font-weight: 700;
            color: var(--dark-green);
            margin-bottom: 0;
        }

        .receipt-date {
            color: #718096;
            font-size: 0.9rem;
        }

        .receipt-body {
            padding: 2rem;
        }

        .info-group {
            margin-bottom: 1.5rem;
        }

        .info-label {
            font-size: 0.85rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 500;
            color: #2d3748;
        }

        .equipment-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-green);
        }

        .cost-section {
            background-color: var(--light-green);
            border-radius: 10px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .cost-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .cost-row:last-child {
            margin-bottom: 0;
            padding-top: 1rem;
            border-top: 2px dashed #a3b18a;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--dark-green);
        }

        .btn-action {
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-print {
            background-color: var(--primary-green);
            color: white;
            border: none;
        }

        .btn-print:hover {
            background-color: var(--dark-green);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 106, 79, 0.3);
        }

        .btn-home {
            background-color: transparent;
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
        }

        .btn-home:hover {
            background-color: var(--primary-green);
            color: white;
        }

        .thank-you {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-green);
            margin-top: 1.5rem;
            padding-bottom: 1.5rem;
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .receipt-card {
                box-shadow: none;
                border: none;
                max-width: 100%;
            }
            .action-buttons {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="receipt-card" id="receipt">
            <!-- Header -->
            <div class="receipt-header">
                <i class="fas fa-tractor receipt-logo"></i>
                <h2 class="receipt-title">AGRIRENTAL</h2>
                <p class="receipt-date" th:text="'Booking ID: #' + ${booking.id} + ' | ' + ${#dates.format(#dates.createNow(), 'dd MMM yyyy, HH:mm')}">Booking ID: #1001</p>
            </div>

            <!-- Body -->
            <div class="receipt-body">
                <div class="row">
                    <!-- Customer Details -->
                    <div class="col-md-6 info-group">
                        <div class="info-label">Customer Name</div>
                        <div class="info-value" th:text="${booking.user.name}">John Doe</div>
                    </div>
                    <div class="col-md-6 info-group text-md-end">
                        <div class="info-label">Email</div>
                        <div class="info-value" th:text="${booking.user.email}">john@example.com</div>
                    </div>
                </div>

                <hr class="text-muted mb-4">

                <!-- Equipment Details -->
                <div class="info-group text-center">
                    <div class="info-label mb-2">Equipment Rented</div>
                    <div class="equipment-name" th:text="${booking.equipment.name}">Mahindra Tractor 575 DI</div>
                    <div class="text-muted small" th:text="${booking.equipment.type}">Tractor</div>
                </div>

                <div class="row mt-4">
                    <div class="col-6 info-group">
                        <div class="info-label">From Date</div>
                        <div class="info-value" th:text="${booking.fromDate}">2023-11-01</div>
                    </div>
                    <div class="col-6 info-group text-end">
                        <div class="info-label">To Date</div>
                        <div class="info-value" th:text="${booking.toDate}">2023-11-05</div>
                    </div>
                </div>

                <!-- Cost Breakdown -->
                <div class="cost-section">
                    <div class="cost-row">
                        <span>Price Per Day</span>
                        <span th:text="'₹' + ${booking.equipment.pricePerDay}">₹1500.00</span>
                    </div>
                    <div class="cost-row">
                        <span>Total Days</span>
                        <span th:text="${days} + ' Days'">4 Days</span>
                    </div>
                    <div class="cost-row">
                        <span>Total Amount Paid</span>
                        <span th:text="'₹' + ${booking.totalCost}">₹6000.00</span>
                    </div>
                </div>

                <div class="thank-you">
                    <i class="fas fa-check-circle me-2"></i>Thank you for choosing AgriRental!
                </div>

                <!-- Action Buttons (Hidden in print) -->
                <div class="d-flex justify-content-center gap-3 mt-4 action-buttons">
                    <button class="btn btn-action btn-print" onclick="window.print()">
                        <i class="fas fa-print me-2"></i>Print Receipt
                    </button>
                    <a href="/bookings" class="btn btn-action btn-home">
                        <i class="fas fa-list me-2"></i>My Bookings
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
